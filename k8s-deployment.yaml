apiVersion: apps/v1
kind: Deployment

metadata:
  name: calculator-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: calculator-app

  template:
    metadata:
      labels:
        app: calculator-app

    spec:
      containers:
      - name: calculator-app

        image: 964742912902.dkr.ecr.eu-west-2.amazonaws.com/calculatorapp:25

        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service

metadata:
  name: calculator-service

spec:
  type: LoadBalancer

  selector:
    app: calculator-app

  ports:
  - port: 80
    targetPort: 8080
